scan:
  file_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".jsx"
    - ".ipynb"
  max_file_size_bytes: 500000
  exclude_paths:
    - "node_modules"
    - ".git"
    - "dist"
    - "build"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".pytest_cache"
    - ".mypy_cache"
  
  # Smart filtering options
  skip_paths:
    - "test"
    - "tests"
    - "__test__"
    - "spec"
    - "docs"
    - "documentation"
    - "examples"
    - ".github"
    - "scripts"
  
  # Priority directories (scanned first)
  priority_paths:
    - "src"
    - "lib"
    - "app"
    - "api"
    - "server"
    - "core"
  
  # Performance settings
  default_file_limit: 1000
  parallel_workers: 10

storage:
  type: "sqlite"
  sqlite_path: "./backend/app.db"

git:
  shallow_clone: true
  depth: 1
