# ── Inference / Serving ──

inference:
  vllm:
    display_name: "vLLM"
    category: "inference_server"
    python:
      imports:
        - "vllm"
        - "from vllm import"
      calls:
        - "LLM("
        - "SamplingParams("
        - "llm.generate"
    docker_images:
      - "vllm/vllm-openai"
    risk_weight: 0.8

  ollama:
    display_name: "Ollama"
    category: "inference_server"
    python:
      imports:
        - "ollama"
        - "import ollama"
      calls:
        - "ollama.chat("
        - "ollama.generate("
        - "ollama.embeddings("
        - "ollama.pull("
    endpoint_urls:
      - "localhost:11434"
      - "127.0.0.1:11434"
      - "host.docker.internal:11434"
    docker_images:
      - "ollama/ollama"
    env_vars:
      - "OLLAMA_HOST"
      - "OLLAMA_BASE_URL"
    risk_weight: 0.4

  huggingface:
    display_name: "Hugging Face"
    category: "llm_provider"
    python:
      imports:
        - "transformers"
        - "from transformers import"
        - "huggingface_hub"
        - "from huggingface_hub import"
        - "sentence_transformers"
        - "from sentence_transformers import"
      calls:
        - "AutoModel.from_pretrained"
        - "AutoTokenizer.from_pretrained"
        - "pipeline("
        - "InferenceClient("
        - "SentenceTransformer("
    env_vars:
      - "HF_TOKEN"
      - "HUGGING_FACE_HUB_TOKEN"
      - "HF_HOME"
    risk_weight: 0.7

  tgi:
    display_name: "Text Generation Inference"
    category: "inference_server"
    docker_images:
      - "ghcr.io/huggingface/text-generation-inference"
    endpoint_urls:
      - "localhost:8080"
    risk_weight: 0.6

# ── MCP (Model Context Protocol) ──

mcp:
  mcp_server:
    display_name: "MCP Server"
    category: "mcp_server"
    config_files:
      - "claude_desktop_config.json"
      - ".cursor/mcp.json"
      - ".codex/config.toml"
      - "mcp.json"
    python:
      imports:
        - "mcp"
        - "from mcp import"
        - "from mcp.server import"
      calls:
        - "Server("
        - "McpServer("
        - "@server.tool"
        - "@server.resource"
    javascript:
      imports:
        - "from '@modelcontextprotocol/sdk'"
        - "require('@modelcontextprotocol/sdk')"
      calls:
        - "new McpServer("
        - "server.tool("
        - "server.resource("
    risk_patterns:
      - pattern: "stdio"
        owasp: "LLM06"
        severity: "medium"
        message: "MCP server using stdio transport — verify server source is trusted"
    risk_weight: 1.0

# ── Security Risk Patterns (cross-cutting) ──

risk_patterns:
  hardcoded_api_key:
    pattern: "(sk-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9-_]{20,})"
    owasp: "LLM07"
    severity: "critical"
    message: "Hardcoded OpenAI API key detected"

  eval_llm_output:
    pattern: "eval\\(.*(?:response|result|output|completion|message)"
    owasp: "LLM05"
    severity: "critical"
    message: "eval() called on LLM output — critical injection risk"

  exec_llm_output:
    pattern: "exec\\(.*(?:response|result|output|completion|message)"
    owasp: "LLM05"
    severity: "critical"
    message: "exec() called on LLM output — critical code execution risk"

  unsanitized_fstring_prompt:
    pattern: "f['\"].*\\{(?:user_input|request|query|message|prompt)\\}.*['\"]"
    owasp: "LLM01"
    severity: "high"
    message: "User input directly interpolated into prompt — prompt injection risk"

  missing_max_tokens:
    context: "completions.create"
    absent_param: "max_tokens"
    owasp: "LLM10"
    severity: "low"
    message: "LLM call without max_tokens — risk of unbounded token consumption"

  deprecated_openai_api:
    pattern: "openai\\.ChatCompletion\\.create"
    severity: "medium"
    message: "Using deprecated OpenAI API (pre-v1.0) — update to client.chat.completions.create()"
